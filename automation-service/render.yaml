services:
  - type: web
    name: surveyor-automation
    runtime: docker
    dockerfilePath: ./automation-service/Dockerfile
    dockerContext: ./automation-service
    plan: free
    envVars:
      - key: AUTOFILL_API_TOKEN
        generateValue: true
      - key: AUTOFILL_MAX_CONCURRENCY
        value: "3"
    healthCheckPath: /health
